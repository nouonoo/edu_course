<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Авторизация</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="admin.css">

</head>

<body class="login-page admin-auth-page">

    <div class="auth-container">

        <h1>Авторизация</h1>



        <form id="login-form" class="admin-login-form">

            <div class="form-group">

                <label for="login">Login</label>

                <input type="text" id="login" name="login" placeholder="login" required autocomplete="username">

            </div>



            <div class="form-group">

                <label for="password">Password</label>

                <input type="password" id="password" name="password" placeholder="passwords" required autocomplete="current-password">

            </div>



            <button type="submit" class="btn-primary btn-login">

                войти <span class="arrow">→</span>

            </button>



            <p id="error-message" class="error-message"></p>

        </form>

    </div>



    <script src="common.js?v=5"></script>

    <script src="auth.js"></script>

</body>

</html>
